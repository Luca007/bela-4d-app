<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redefinir Senha | Programa 4D</title>
  <style>
    :root {
      --pink: #f0059a;
      --pink-dark: #c0027c;
      --bg: #0d0d12;
      --card: #1a1a22;
      --border: rgba(255,255,255,0.08);
      --text: #e8e8ed;
      --muted: rgba(255,255,255,0.55);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      width: calc(100vw - 40px);
      max-width: 400px;
    }
    .logo {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #1a1a2a, #08080d);
      border: 2px solid var(--pink);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
      box-shadow: 0 0 15px rgba(240,5,154,0.25);
    }
    .logo span { color: var(--pink); font-weight: 900; font-size: 11px; }
    h1 { font-size: 22px; font-weight: 800; text-align: center; margin-bottom: 6px; }
    p.sub { color: var(--muted); font-size: 14px; text-align: center; margin-bottom: 24px; }
    label { display: block; color: var(--muted); font-size: 13px; font-weight: 600; margin-bottom: 6px; }
    input {
      width: 100%; padding: 14px 16px;
      background: rgba(255,255,255,0.05);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      color: #fff; font-size: 16px;
      transition: border-color 0.2s;
      margin-bottom: 16px;
    }
    input:focus { border-color: var(--pink); outline: none; }
    .btn {
      width: 100%; padding: 14px;
      border-radius: 14px; border: none;
      background: linear-gradient(135deg, var(--pink), var(--pink-dark));
      color: #fff; font-size: 16px; font-weight: 700;
      cursor: pointer;
    }
    .btn:disabled { opacity: 0.5; cursor: default; }
    .msg { font-size: 13px; min-height: 20px; margin-top: 12px; text-align: center; font-weight: 600; }
    .msg.error { color: #f87171; }
    .msg.success { color: #34d399; }
    .msg.info { color: var(--muted); }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo"><span>GMP</span></div>
    <h1>Redefinir Senha</h1>
    <p class="sub">Escolha uma nova senha para acessar o programa</p>

    <div id="step-loading" class="msg info" style="margin-bottom:16px">🔄 Verificando link...</div>
    <div id="step-form" style="display:none">
      <label for="new-password">Nova senha</label>
      <input type="password" id="new-password" placeholder="Mínimo 6 caracteres" minlength="6" autocomplete="new-password">
      <label for="confirm-password">Confirmar senha</label>
      <input type="password" id="confirm-password" placeholder="Repita a senha" minlength="6" autocomplete="new-password">
      <div id="step-error" class="msg error" style="margin-bottom:12px"></div>
      <button id="reset-btn" class="btn">Redefinir senha</button>
      <div id="step-msg" class="msg"></div>
    </div>
    <div id="step-done" style="display:none; text-align:center">
      <div id="done-msg" class="msg success" style="font-size:16px; margin:16px 0">✅ Senha redefinida com sucesso!</div>
      <a href="/" style="display:inline-block; margin-top:12px; padding:12px 24px; background:linear-gradient(135deg,var(--pink),var(--pink-dark)); border-radius:14px; color:#fff; text-decoration:none; font-weight:700; font-size:15px">Ir para o login</a>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js';
    import { getAuth, confirmPasswordReset, verifyPasswordResetCode } from 'https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js';

    const firebaseConfig = {
      apiKey: "AIzaSyDPXq9CwW2ulL6DeRIlaMK10DztL-BP6h4",
      authDomain: "bela-4d-app.firebaseapp.com",
      projectId: "bela-4d-app",
      storageBucket: "bela-4d-app.appspot.com",
      messagingSenderId: "391056456533",
      appId: "1:391056456533:web:b3f0c8e0e0e0e0e0e0e0e0"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const urlParams = new URLSearchParams(window.location.search);
    const oobCode = urlParams.get('oobCode');

    const loadingEl = document.getElementById('step-loading');
    const formEl = document.getElementById('step-form');
    const doneEl = document.getElementById('step-done');
    const errorEl = document.getElementById('step-error');
    const msgEl = document.getElementById('step-msg');
    const doneMsgEl = document.getElementById('done-msg');
    const resetBtn = document.getElementById('reset-btn');
    const newPasswordEl = document.getElementById('new-password');
    const confirmPasswordEl = document.getElementById('confirm-password');

    if (!oobCode) {
      loadingEl.textContent = '❌ Link inválido ou expirado. Solicite um novo email de recuperação.';
      loadingEl.className = 'msg error';
    } else {
      // Verify the oobCode is valid
      try {
        await verifyPasswordResetCode(auth, oobCode);
        loadingEl.style.display = 'none';
        formEl.style.display = 'block';
      } catch (err) {
        loadingEl.textContent = '❌ Link expirado ou inválido. Solicite um novo email de recuperação.';
        loadingEl.className = 'msg error';
      }
    }

    resetBtn.addEventListener('click', async () => {
      const pw = newPasswordEl.value;
      const confirm = confirmPasswordEl.value;
      errorEl.textContent = '';
      msgEl.textContent = '';

      if (!pw || pw.length < 6) {
        errorEl.textContent = 'A senha deve ter pelo menos 6 caracteres.';
        return;
      }
      if (pw !== confirm) {
        errorEl.textContent = 'As senhas não conferem.';
        return;
      }

      resetBtn.disabled = true;
      resetBtn.textContent = 'Redefinindo...';

      try {
        await confirmPasswordReset(auth, oobCode, pw);
        formEl.style.display = 'none';
        doneEl.style.display = 'block';
      } catch (err) {
        const msg = String(err?.message || err);
        if (msg.includes('expired')) {
          errorEl.textContent = 'Link expirado. Solicite um novo email.';
        } else if (msg.includes('weak-password')) {
          errorEl.textContent = 'Senha muito fraca. Use ao menos 6 caracteres.';
        } else {
          errorEl.textContent = 'Erro ao redefinir senha. Tente novamente.';
        }
        resetBtn.disabled = false;
        resetBtn.textContent = 'Redefinir senha';
      }
    });
  </script>
</body>
</html>
