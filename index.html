<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Guia Metabólico Personalizado - Seu programa exclusivo de controle de glicemia">
  <title>Guia Metabólico Personalizado | GMP</title>
  
  <!-- DNS prefetch e preconnect para recursos críticos -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://firestore.googleapis.com">
  <link rel="preconnect" href="https://identitytoolkit.googleapis.com">
  <link rel="dns-prefetch" href="https://southamerica-east1-bela-4d-app.cloudfunctions.net">

  <!-- Fontes com display=swap para não bloquear render -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800;900&family=Outfit:wght@400;700;800&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <noscript>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800;900&family=Outfit:wght@400;700;800&display=swap" rel="stylesheet">
  </noscript>

  <!-- Preload de CSS críticos -->
  <link rel="preload" href="assets/css/variables.css" as="style">
  <link rel="preload" href="assets/css/reset.css" as="style">

  <!-- Stylesheets -->
  <link rel="stylesheet" href="assets/css/reset.css">
  <link rel="stylesheet" href="assets/css/variables.css">
  <link rel="stylesheet" href="assets/css/animations.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/dashboard.css">
  <link rel="stylesheet" href="assets/css/forms.css">
  <link rel="stylesheet" href="assets/css/chat.css">
  <link rel="stylesheet" href="assets/css/recipes.css">
  <link rel="stylesheet" href="assets/css/food-search.css">
  <link rel="stylesheet" href="assets/css/gamification.css">
  
  <style>
    /* Quick inline styles for app initialization */
    body {
      background-color: var(--color-bg);
      color: var(--color-text);
    }
    
    #app {
      width: 100%;
      min-height: 100vh;
    }
  </style>
</head>
<body>
  <!-- Background -->
  <div class="bg-container">
    <div class="bg-grid"></div>
  </div>
  
  <!-- Main App -->
  <div id="app"></div>
  
  <!-- Main App Scripts -->
  <script type="module" src="assets/js/app.js"></script>

  <!-- Service Worker para cache offline + conexão -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').then((reg) => {
          reg.addEventListener('updatefound', () => {
            const newSW = reg.installing;
            if (newSW) {
              newSW.addEventListener('statechange', () => {
                if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
                  console.log('[App] Nova versão do SW disponível — recarregue para atualizar');
                }
              });
            }
          });
        }).catch(() => {});
      });
    }
  </script>
</body>
</html>
